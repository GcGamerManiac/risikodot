<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Salamina Risiko Edition</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #121216; --accent: #f39c12; --panel: #1e1e26; --text: #e0e0e0; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* Lobby UI */
        #lobby { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: var(--panel); padding: 30px; border-radius: 10px; text-align: center; }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        
        /* Game UI */
        #game-ui { display: none; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        #map { background: #2c3e50; height: 500px; border-radius: 10px; position: relative; border: 2px solid #444; }
        .sidebar { background: var(--panel); padding: 15px; border-radius: 10px; }
        
        .territory-label { 
            position: absolute; background: rgba(0,0,0,0.7); padding: 2px 5px; 
            border-radius: 3px; font-size: 10px; color: white; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="card">
            <h2>RISIKO SALAMINA</h2>
            <input type="text" id="roomInput" placeholder="Codice Stanza (es: 123)">
            <input type="text" id="nameInput" placeholder="Tuo Nome">
            <button onclick="joinGame()" style="width:100%; padding:10px; background:var(--accent); border:none; cursor:pointer;">ENTRA</button>
        </div>
    </div>

    <div id="game-ui">
        <div class="grid">
            <div id="map">
                </div>
            <div class="sidebar">
                <h3>Turno: <span id="current-turn">-</span></h3>
                <hr>
                <h4>I Tuoi Territori:</h4>
                <ul id="my-territories"></ul>
                <button onclick="endTurn()" style="width:100%">Fine Turno</button>
            </div>
        </div>
    </div>

    <script>
        // SOLUZIONE BUG 1: Inizializziamo socket solo dopo il caricamento
        let socket;
        try {
            socket = io();
        } catch(e) {
            console.error("Errore: Libreria Socket.io non trovata. Assicurati che il server sia attivo.");
        }

        let myId;
        let activeRoom; // SOLUZIONE BUG 2: Rinominata per evitare conflitti con gli ID HTML

        function joinGame() {
            const rVal = document.getElementById('roomInput').value;
            const nVal = document.getElementById('nameInput').value;

            if(!rVal || !nVal) return alert("Compila tutto!");

            activeRoom = rVal;
            socket.emit('joinRoom', { room: activeRoom, name: nVal });

            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
        }

        socket.on('init', data => { myId = data.id; });

        socket.on('state', state => {
            document.getElementById('current-turn').innerText = state.turnName || "In attesa...";
            updateMap(state.territories);
        });

        // Esempio di mapping territori basato sul tuo PDF [cite: 1, 11]
        const territoryNames = {
            "t1": "CASA DI RIKO", "t2": "CASA DI ANGELO", "t3": "CASA DI SANTE",
            "t4": "BADAWÏ", "t5": "CASA DI GIANLUCA", "t6": "VIA COSTA",
            "t7": "CLUBHOUSE", "t8": "PRESEPE VIVENTE", "t11": "LA PUPA"
        };

        function updateMap(territories) {
            const map = document.getElementById('map');
            map.innerHTML = ""; // Pulisci mappa
            
            Object.keys(territories).forEach((id, index) => {
                const t = territories[id];
                const label = document.createElement('div');
                label.className = 'territory-label';
                
                // Posizionamento casuale o a griglia per ora
                label.style.left = (15 + (index % 6) * 15) + "%";
                label.style.top = (15 + Math.floor(index / 6) * 15) + "%";
                
                const name = territoryNames[id] || id;
                label.innerHTML = `<b>${name}</b><br>Truppe: ${t.troops}`;
                label.style.border = t.owner === myId ? "2px solid #00ff00" : "1px solid white";
                
                map.appendChild(label);
            });
        }

        function endTurn() {
            socket.emit('endTurn', { room: activeRoom });
        }
    </script>
</body>
</html>
