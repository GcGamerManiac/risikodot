<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salamina Risiko Edition</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg: #0a0a0c; --panel: #16161e; --accent: #f39c12; --danger: #e74c3c; --success: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; }
        
        #lobby { display: flex; justify-content: center; align-items: center; height: 100vh; }
        #setup-phase, #game-ui { display: none; padding: 20px; }

        .cards-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 20px; 
            padding: 20px; 
        }
        
        .card {
            width: 150px; height: 210px; border-radius: 12px; 
            background-size: cover; background-position: center;
            position: relative; cursor: pointer; border: 3px solid #444;
            transition: transform 0.3s; background-color: #222;
        }
        .card.selected { transform: translateY(-30px); border-color: var(--accent); }
        .card-overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); padding: 5px; font-size: 10px; text-align: center; }
        .troops-badge { position: absolute; top: -10px; right: -10px; background: var(--accent); color: black; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .btn { padding: 12px 25px; background: var(--accent); border: none; font-weight: bold; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="lobby">
        <div style="text-align:center; background: var(--panel); padding: 40px; border-radius: 20px;">
            <h1>SALAMINA RISIKO</h1>
            <input type="text" id="roomInput" placeholder="ID Stanza" style="padding:10px; width:80%"><br><br>
            <input type="text" id="nameInput" placeholder="Tuo Nome" style="padding:10px; width:80%"><br><br>
            <button class="btn" onclick="join()">ENTRA</button>
            <div id="status"></div>
            <button id="startBtn" class="btn" style="display:none; margin-top:20px" onclick="requestStart()">INIZIA ORA</button>
        </div>
    </div>

    <div id="setup-phase">
        <div style="display:flex; justify-content: space-between; align-items: center; background: var(--panel); padding: 20px; border-radius: 15px;">
            <div>
                <h2>Posiziona le truppe</h2>
                <p>Truppe da assegnare: <b id="troops-count" style="color:var(--accent); font-size: 1.5em;">30</b></p>
            </div>
            <button class="btn" onclick="confirmSetup()">CONFERMA POSIZIONI</button>
        </div>
        <div class="cards-container" id="my-cards-setup"></div>
    </div>

    <div id="game-ui">
        <h2 id="turn-info">In attesa...</h2>
        <div class="cards-container" id="game-board"></div>
        <button id="endTurnBtn" class="btn" onclick="endTurn()" style="display:none">FINE TURNO</button>
    </div>

    <script>
        const socket = io("https://risikodot.onrender.com");
        let myId, currentRoom, myPlacements = {}, totalTroops = 30;

        const TERRITORY_LIST = [
            "CASA DI RIKO", "CASA DI ANGELO", "CASA DI SANTE", "BADAWÏ", "CASA DI GIANLUCA",
            "VIA COSTA", "CLUBHOUSE", "PRESEPE VIVENTE", "CORSO NAZIONALE", "MUNICIPIO",
            "LA PUPA", "L'AGRUMETO", "LA MANNA DEL POZZO", "CHIESA MADRE", "LIMONAIA",
            "RODEO", "TERME", "SABBIADORO", "LIDO VERDE", "MONT'ALBANO", "SPEZIALE",
            "TORRE CANNE", "POZZO FACETO", "SAVELLETRI", "EGNAZIA", "FORCAT Ella",
            "COCCARO", "MASSERIA TORRE COCCARO", "MASSERIA SAN DOMENICO", "PETTOLECCHIA",
            "ZOO SAFARI", "SELVA DI FASANO", "LAURETO", "CANALE DI PIRRO", "COREGGIA",
            "GORGOfreddo", "L'ASSUNTA", "CAPITOLO", "SANTO STEFANO", "MONOPOLI",
            "POLIGNANO", "CASTELLANA"
        ];

        function getImg(name) {
            const idx = TERRITORY_LIST.indexOf(name) + 1;
            const folder = "CARTA territori e jolly";
            return encodeURI(`${folder}/CARTA territori e jolly-${idx}.png`);
        }

        function join() {
            const r = document.getElementById('roomInput').value;
            const n = document.getElementById('nameInput').value;
            currentRoom = r;
            socket.emit('joinRoom', { room: r, name: n });
        }

        function requestStart() {
            socket.emit('startGameRequest', currentRoom);
        }

        socket.on('init', data => { myId = data.id; });

        socket.on('state', state => {
            console.log("Stato ricevuto dal server:", state.phase); // DEBUG

            if (state.phase === 'LOBBY') {
                document.getElementById('lobby').style.display = 'flex';
                document.getElementById('status').innerText = `Giocatori: ${Object.keys(state.players).length}`;
                if (Object.keys(state.players).length >= 2) document.getElementById('startBtn').style.display = 'inline-block';
            } 
            else if (state.phase === 'SETUP') {
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('setup-phase').style.display = 'block';
                renderSetup(state.territories);
            }
            else if (state.phase === 'PLAY') {
                document.getElementById('setup-phase').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                renderPlay(state);
            }
        });

        function renderSetup(territories) {
            const container = document.getElementById('my-cards-setup');
            container.innerHTML = "";
            let count = 0;

            Object.entries(territories).forEach(([name, data]) => {
                if (data.owner === myId) {
                    count++;
                    if (!myPlacements[name]) myPlacements[name] = 1;
                    
                    const card = document.createElement('div');
                    card.className = "card";
                    card.style.backgroundImage = `url('${getImg(name)}')`;
                    card.innerHTML = `
                        <div class="troops-badge">${myPlacements[name]}</div>
                        <div class="card-overlay">${name}</div>
                    `;
                    
                    card.onclick = async () => {
                        // Effetto alzata
                        document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                        card.classList.add('selected');

                        const { value: num } = await Swal.fire({
                            title: name,
                            text: "Quanti carri armati vuoi mettere?",
                            input: 'number',
                            inputValue: myPlacements[name],
                            inputAttributes: { min: 1 }
                        });

                        if (num) {
                            const val = parseInt(num);
                            const diff = val - myPlacements[name];
                            if (totalTroops - diff >= 0 && val >= 1) {
                                myPlacements[name] = val;
                                totalTroops -= diff;
                                renderSetup(territories);
                            } else {
                                Swal.fire("Errore", "Truppe insufficienti o numero non valido!", "error");
                            }
                        }
                    };
                    container.appendChild(card);
                }
            });
            document.getElementById('troops-count').innerText = totalTroops;
            console.log("Carte renderizzate per te:", count);
        }

        function confirmSetup() {
            if (totalTroops > 0) {
                return Swal.fire("Attenzione", `Devi ancora distribuire ${totalTroops} truppe!`, "warning");
            }
            socket.emit('confirmSetup', { room: currentRoom, placements: myPlacements });
        }

        function renderPlay(state) {
            const board = document.getElementById('game-board');
            board.innerHTML = "";
            const isMyTurn = state.order[state.turnIndex] === myId;
            document.getElementById('turn-info').innerText = isMyTurn ? "Tocca a te!" : "Turno dell'avversario";
            document.getElementById('endTurnBtn').style.display = isMyTurn ? 'block' : 'none';

            TERRITORY_LIST.forEach(name => {
                const data = state.territories[name];
                const card = document.createElement('div');
                card.className = "card";
                card.style.backgroundImage = `url('${getImg(name)}')`;
                card.style.borderColor = data.owner === myId ? "var(--success)" : "var(--danger)";
                card.innerHTML = `<div class="troops-badge">${data.troops}</div><div class="card-overlay">${name}</div>`;
                board.appendChild(card);
            });
        }
        
        function endTurn() { socket.emit('endTurn', { room: currentRoom }); }
    </script>
</body>
</html>
