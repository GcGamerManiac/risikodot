<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Salamina Risiko - Battle Lobby</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg: #1a1a2e; --accent: #e94560; --panel: #16213e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; }
        
        #lobby { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: var(--panel); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 350px; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }

        /* Animazione Dado */
        .dice-box { font-size: 80px; margin: 20px; display: inline-block; }
        .rolling { animation: spin 0.4s infinite linear; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #game-ui { display: none; }
    </style>
</head>
<body>

<div id="lobby">
    <div class="card">
        <h1 style="color: var(--accent)">SALAMINA</h1>
        <input type="text" id="roomInput" placeholder="ID Stanza">
        <input type="text" id="nameInput" placeholder="Tuo Nome">
        <button onclick="connectToServer()">ENTRA</button>
    </div>
</div>

<div id="game-ui">
    <h1>Mappa di Gioco</h1>
</div>

<script>
let socket;
let currentRoom;

function connectToServer() {
    const room = document.getElementById('roomInput').value;
    const name = document.getElementById('nameInput').value;

    if(!room || !name) return Swal.fire("Ehilà!", "Metti nome e stanza!", "warning");

    // FIX CORS: Aggiungiamo configurazione client
    socket = io("https://risikodot.onrender.com", {
        withCredentials: true,
        transports: ["polling", "websocket"] // polling aiuta con i problemi di CORS iniziali
    });

    socket.emit('joinRoom', { room, name });
    currentRoom = room;

    // BANNER ATTESA
    Swal.fire({
        title: 'In attesa di sfidanti...',
        html: 'Giocatori necessari: 2<br>Connessi: <b id="p-count">1</b>',
        allowOutsideClick: false,
        showConfirmButton: false,
        didOpen: () => Swal.showLoading()
    });

    listenEvents();
}

function listenEvents() {
    socket.on('state', (state) => {
        const players = Object.keys(state.players);
        const countEl = document.getElementById('p-count');
        if(countEl) countEl.innerText = players.length;

        if(players.length >= 2 && !window.rollingStarted) {
            startInitialRoll();
        }
    });

    socket.on('initialRollResult', (data) => {
        // Gestione pareggio o vincitore dal server
        if(data.tie) {
            Swal.fire("Pareggio!", "Si ricalcia il dado per decidere chi inizia", "info").then(startInitialRoll);
        } else {
            Swal.fire({
                title: `Inizia ${data.winnerName}!`,
                text: `Ha fatto ${data.roll}`,
                icon: 'success',
                timer: 3000
            });
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
        }
    });
}

async function startInitialRoll() {
    window.rollingStarted = true;
    
    const { isConfirmed } = await Swal.fire({
        title: 'Pronti a combattere!',
        text: 'Lancia il dado per decidere chi inizia la partita.',
        confirmButtonText: 'LANCIA 🎲',
        allowOutsideClick: false
    });

    if (isConfirmed) {
        // Mostra dado che gira
        Swal.fire({
            title: 'Lancio...',
            html: '<div class="dice-box rolling">🎲</div>',
            allowOutsideClick: false,
            showConfirmButton: false,
            timer: 2000,
            didClose: () => {
                const myRoll = Math.floor(Math.random() * 6) + 1;
                socket.emit('initialRoll', { room: currentRoom, roll: myRoll });
                
                Swal.fire({
                    title: `Hai fatto ${myRoll}!`,
                    text: 'Aspettiamo gli altri...',
                    allowOutsideClick: false,
                    showConfirmButton: false
                });
            }
        });
    }
}
</script>
</body>
</html>
