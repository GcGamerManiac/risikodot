<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salamina Risiko Edition</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg: #0a0a0c; --panel: #16161e; --accent: #f39c12; --danger: #e74c3c; --success: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }

        /* Background Map Styling */
        #map-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; opacity: 0.4; display: flex; align-items: center; justify-content: center;
        }
        #map-container svg { width: 90%; height: 90%; }
        #map-container svg path, #map-container svg polygon { 
            fill: #222; stroke: #444; stroke-width: 1; transition: all 0.3s; 
        }
        /* Classe Rilievo */
        .highlight-path { 
            fill: var(--accent) !important; filter: drop-shadow(0 0 8px var(--accent)); 
            stroke: white !important; stroke-width: 2px !important;
        }

        #lobby { display: flex; justify-content: center; align-items: center; height: 100vh; }
        #setup-phase, #game-ui { display: none; padding: 20px; position: relative; z-index: 1; }

        .cards-container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; padding: 20px; background: rgba(0,0,0,0.5); border-radius: 20px;
        }
        
        .card {
            width: 140px; height: 200px; border-radius: 10px; background-size: cover;
            position: relative; cursor: pointer; border: 2px solid #444; transition: 0.3s;
        }
        .card:hover { transform: scale(1.05); border-color: var(--accent); }
        .card-overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 5px; font-size: 11px; text-align: center; }
        .troops-badge { position: absolute; top: -10px; right: -10px; background: var(--accent); color: black; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid white; }

        .btn { padding: 12px 25px; background: var(--accent); border: none; font-weight: bold; border-radius: 8px; cursor: pointer; color: black; }
        .setup-header { display: flex; justify-content: space-between; align-items: center; background: var(--panel); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="map-container">
        </div>

    <div id="lobby">
        <div style="text-align:center; background: var(--panel); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <h1>SALAMINA RISIKO</h1>
            <input type="text" id="roomInput" placeholder="ID Stanza" style="padding:10px; margin-bottom:10px;"><br>
            <input type="text" id="nameInput" placeholder="Tuo Nome" style="padding:10px; margin-bottom:10px;"><br>
            <button class="btn" onclick="join()">ENTRA IN GUERRA</button>
            <div id="status" style="margin-top:20px"></div>
            <button id="startBtn" class="btn" style="display:none; margin-top:20px" onclick="requestStart()">INIZIA PARTITA</button>
        </div>
    </div>

    <div id="setup-phase">
        <div class="setup-header">
            <div>
                <h2>Fase di Rinforzo</h2>
                <p>Truppe rimaste da piazzare: <b id="troops-count" style="color:var(--accent); font-size: 1.5em;">-</b></p>
            </div>
            <button class="btn" onclick="confirmSetup()">CONFERMA SCHIERAMENTO</button>
        </div>
        <div class="cards-container" id="my-cards-setup"></div>
    </div>

    <div id="game-ui">
        <div class="setup-header">
            <h2 id="turn-info">Caricamento...</h2>
            <button id="endTurnBtn" class="btn" onclick="endTurn()" style="display:none">PASSA TURNO</button>
        </div>
        <div class="cards-container" id="game-board"></div>
    </div>

    <script>
        const socket = io("https://risikodot.onrender.com");
        let myId, currentRoom, myPlacements = {}, totalAvailable = 30;

        // Sync card hover con la mappa SVG
        function highlightMap(name, active) {
            const svgId = name.replace(/\s+/g, '_');
            const el = document.getElementById(svgId);
            if (el) active ? el.classList.add('highlight-path') : el.classList.remove('highlight-path');
        }

        function join() {
            currentRoom = document.getElementById('roomInput').value;
            socket.emit('joinRoom', { room: currentRoom, name: document.getElementById('nameInput').value });
        }

        function requestStart() { socket.emit('startGameRequest', currentRoom); }

        socket.on('init', data => { myId = data.id; });

        socket.on('state', state => {
            if (state.phase === 'LOBBY') {
                document.getElementById('status').innerText = `Giocatori connessi: ${Object.keys(state.players).length}`;
                if (Object.keys(state.players).length >= 2) document.getElementById('startBtn').style.display = 'inline-block';
            } else if (state.phase === 'SETUP') {
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('setup-phase').style.display = 'block';
                renderSetup(state.territories);
            } else if (state.phase === 'PLAY') {
                document.getElementById('setup-phase').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                renderPlay(state);
            }
        });

        function renderSetup(territories) {
            const container = document.getElementById('my-cards-setup');
            container.innerHTML = "";
            
            // Inizializza 1 truppa per territorio se vuoto
            Object.entries(territories).forEach(([name, data]) => {
                if (data.owner === myId && !myPlacements[name]) myPlacements[name] = 1;
            });

            const used = Object.values(myPlacements).reduce((a, b) => a + b, 0);
            const remaining = totalAvailable - used;
            document.getElementById('troops-count').innerText = remaining;

            Object.entries(territories).forEach(([name, data]) => {
                if (data.owner === myId) {
                    const card = document.createElement('div');
                    card.className = "card";
                    card.style.backgroundImage = `url('CARTA territori e jolly/${name}.png')`; // Nota: Assicurati che i nomi file combacino
                    card.innerHTML = `<div class="troops-badge">${myPlacements[name]}</div><div class="card-overlay">${name}</div>`;
                    
                    card.onmouseenter = () => highlightMap(name, true);
                    card.onmouseleave = () => highlightMap(name, false);

                    card.onclick = async () => {
                        const { value: num } = await Swal.fire({
                            title: name,
                            text: `Quante truppe? (Disponibili: ${remaining + myPlacements[name]})`,
                            input: 'number',
                            inputValue: myPlacements[name],
                            inputAttributes: { min: 1, max: 30 }
                        });

                        if (num) {
                            const val = parseInt(num);
                            const diff = val - myPlacements[name];
                            if (val >= 1 && (remaining - diff) >= 0) {
                                myPlacements[name] = val;
                                renderSetup(territories);
                            } else {
                                Swal.fire("Errore", "Numero truppe non valido o insufficienti!", "error");
                            }
                        }
                    };
                    container.appendChild(card);
                }
            });
        }

        function confirmSetup() {
            const used = Object.values(myPlacements).reduce((a, b) => a + b, 0);
            if (used !== 30) {
                return Swal.fire("Attenzione", `Devi usare esattamente 30 truppe. Ora ne hai usate ${used}.`, "warning");
            }
            socket.emit('confirmSetup', { room: currentRoom, placements: myPlacements });
        }

        function renderPlay(state) {
            const board = document.getElementById('game-board');
            board.innerHTML = "";
            const isMyTurn = state.order[state.turnIndex] === myId;
            document.getElementById('turn-info').innerText = isMyTurn ? "È IL TUO TURNO!" : "ATTENDI IL NEMICO...";
            document.getElementById('endTurnBtn').style.display = isMyTurn ? 'block' : 'none';

            Object.entries(state.territories).forEach(([name, data]) => {
                const card = document.createElement('div');
                card.className = "card";
                card.style.borderColor = data.owner === myId ? "var(--success)" : "var(--danger)";
                card.innerHTML = `<div class="troops-badge">${data.troops}</div><div class="card-overlay">${name}</div>`;
                card.onmouseenter = () => highlightMap(name, true);
                card.onmouseleave = () => highlightMap(name, false);
                board.appendChild(card);
            });
        }

        function endTurn() { socket.emit('endTurn', { room: currentRoom }); }
    </script>
</body>
</html>
