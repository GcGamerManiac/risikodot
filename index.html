<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salamina Risiko Full</title>
<script src="/socket.io/socket.io.js"></script>
<style>
body{font-family:Arial;background:#1e1e2f;color:white;margin:0;display:flex}
#map{width:70%;background:#2c3e50}
#ui{width:30%;padding:10px}
path{stroke:#000;cursor:pointer}
.selected{stroke:yellow;stroke-width:3}
button{padding:10px;margin:5px}
</style>
</head>
<body>

<div id="map">
<svg viewBox="0 0 800 600">
  <path id="t1" d="M10,10 L150,10 L150,100 L10,100 Z" fill="gray"/>
  <path id="t2" d="M160,10 L300,10 L300,100 L160,100 Z" fill="gray"/>
</svg>
</div>

<div id="ui">
<h2>Lobby</h2>
<input id="room" placeholder="Codice stanza">
<input id="name" placeholder="Nome">
<button onclick="join()">Entra</button>

<h3>Giocatori</h3>
<ul id="players"></ul>

<h3>Turno</h3>
<div id="turn"></div>

<h3>Azioni</h3>
<button onclick="attack()">Attacca</button>
<button onclick="endTurn()">Fine turno</button>

<h3>Dadi</h3>
<div id="dice"></div>

<h3>Carte</h3>
<button onclick="drawCard('imprevisti')">Imprevisti</button>
<button onclick="drawCard('probabilita')">Probabilità</button>
<div id="card"></div>
</div>

<script>
const socket = io();
let playerId=null, room=null;
let selected=null, target=null;
let state=null;

function join(){
  room=document.getElementById('room').value;
  const name=document.getElementById('name').value;
  socket.emit('joinRoom',{room,name});
}

socket.on('init', data=>{playerId=data.id});

socket.on('state', s=>{
  state=s;
  render();
});

function render(){
  document.getElementById('players').innerHTML = Object.values(state.players)
    .map(p=>`<li>${p.name}</li>`).join('');

  document.getElementById('turn').innerText = state.turnName;

  for(let t in state.territories){
    const el=document.getElementById(t);
    if(!el) continue;
    el.setAttribute('fill', state.territories[t].owner===playerId?'green':'red');
  }
}

// selezione territori

document.querySelectorAll('path').forEach(p=>{
  p.onclick=()=>{
    if(!selected){selected=p.id;p.classList.add('selected');}
    else{target=p.id;}
  }
});

function attack(){
  if(!selected||!target)return alert('Seleziona attacco e difesa');
  socket.emit('attack',{room,from:selected,to:target});
}

function endTurn(){
  socket.emit('endTurn',{room});
}

// dadi lato client
socket.on('dice', data=>{
  document.getElementById('dice').innerText = `Attacco ${data.a} vs Difesa ${data.d}`;
});

// carte
let imp=["Perdi 2 armate","Salti turno"];
let prob=["+3 armate","Bonus attacco"];

function drawCard(type){
  const text = type==='imprevisti'
    ? imp[Math.floor(Math.random()*imp.length)]
    : prob[Math.floor(Math.random()*prob.length)];

  document.getElementById('card').innerText=text;
}
</script>

</body>
</html>
