<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Salamina Risiko - Pro Edition</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg: #121216; --accent: #f39c12; --panel: #1e1e26; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; }
        
        #lobby, #setup-phase, #game-ui { display: none; padding: 20px; }
        #lobby { display: flex; justify-content: center; align-items: center; height: 100vh; }

        /* Grafica Carte */
        .cards-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding: 20px; }
        .card {
            width: 120px; height: 160px; background: white; color: black; border-radius: 8px;
            padding: 10px; text-align: center; font-weight: bold; cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s; position: relative;
        }
        .card.selected { transform: translateY(-20px); box-shadow: 0 10px 20px var(--accent); border: 3px solid var(--accent); }
        .card .troops-badge { position: absolute; bottom: 10px; right: 10px; background: var(--accent); padding: 5px; border-radius: 50%; }

        .btn { padding: 10px 20px; background: var(--accent); border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .btn:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="lobby">
    <div style="text-align:center">
        <h1>SALAMINA RISIKO</h1>
        <input type="text" id="roomInput" placeholder="ID Stanza" style="padding:10px"><br><br>
        <input type="text" id="nameInput" placeholder="Tuo Nome" style="padding:10px"><br><br>
        <button class="btn" onclick="join()">ENTRA NELLA STANZA</button>
        <p id="player-list"></p>
        <button id="startBtn" class="btn" style="display:none" onclick="requestStart()">INIZIA DISTRIBUZIONE</button>
    </div>
</div>

<div id="setup-phase">
    <h2>Fase di Posizionamento</h2>
    <p>Distribuisci le tue 30 truppe. Ogni territorio deve avere almeno 1 truppa.</p>
    <div style="background: var(--panel); padding: 10px; border-radius: 10px;">
        Truppe rimanenti: <b id="troops-count">30</b>
    </div>
    <div class="cards-container" id="my-cards"></div>
    <button class="btn" onclick="confirmSetup()">CONFERMA POSIZIONAMENTO</button>
</div>

<div id="game-ui">
    <h2 id="turn-info"></h2>
    <div id="board" class="cards-container"></div>
    <button id="endTurnBtn" class="btn" onclick="endTurn()">FINE TURNO</button>
</div>

<script>
const socket = io("https://risikodot.onrender.com");
let myId, currentRoom, myPlacements = {}, totalTroops = 30;

function join() {
    const room = document.getElementById('roomInput').value;
    const name = document.getElementById('nameInput').value;
    currentRoom = room;
    socket.emit('joinRoom', { room, name });
}

function requestStart() {
    socket.emit('startGameRequest', currentRoom);
}

socket.on('init', data => myId = data.id);

socket.on('state', state => {
    if (state.phase === 'LOBBY') {
        document.getElementById('lobby').style.display = 'flex';
        const players = Object.values(state.players);
        document.getElementById('player-list').innerText = "Giocatori: " + players.map(p => p.name).join(', ');
        if (players.length >= 2) document.getElementById('startBtn').style.display = 'inline-block';
    } 
    else if (state.phase === 'SETUP') {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('setup-phase').style.display = 'block';
        renderSetup(state.territories);
    }
    else if (state.phase === 'PLAY') {
        document.getElementById('setup-phase').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        renderPlay(state);
    }
});

function renderSetup(territories) {
    const container = document.getElementById('my-cards');
    container.innerHTML = "";
    
    Object.entries(territories).forEach(([name, data]) => {
        if (data.owner === myId) {
            if (!myPlacements[name]) myPlacements[name] = 1; // Minimo 1
            
            const card = document.createElement('div');
            card.className = "card" + (window.selectedCard === name ? " selected" : "");
            card.innerHTML = `${name}<div class="troops-badge">${myPlacements[name]}</div>`;
            
            card.onclick = () => {
                window.selectedCard = name;
                renderSetup(territories);
                openTroopMenu(name);
            };
            container.appendChild(card);
        }
    });
    updateTroopCount();
}

async function openTroopMenu(name) {
    const { value: num } = await Swal.fire({
        title: `Truppe su ${name}`,
        input: 'number',
        inputLabel: `Hai usato ${30 - totalTroops}/30 truppe`,
        inputValue: myPlacements[name],
        showCancelButton: true
    });

    if (num) {
        const diff = parseInt(num) - myPlacements[name];
        if (totalTroops - diff >= 0 && parseInt(num) >= 1) {
            myPlacements[name] = parseInt(num);
            totalTroops -= diff;
            renderSetup(window.lastStateTerritories || {});
        } else {
            Swal.fire("Errore", "Truppe insufficienti o numero non valido (minimo 1)!", "error");
        }
    }
}

function confirmSetup() {
    if (totalTroops > 0) {
        return Swal.fire("Attenzione", `Devi ancora posizionare ${totalTroops} truppe!`, "warning");
    }
    socket.emit('confirmSetup', { room: currentRoom, placements: myPlacements });
    Swal.fire("Pronto!", "In attesa degli altri giocatori...", "success");
}

function renderPlay(state) {
    const isMyTurn = state.order[state.turnIndex] === myId;
    document.getElementById('turn-info').innerText = isMyTurn ? "È IL TUO TURNO!" : `Turno di: ${state.players[state.order[state.turnIndex]].name}`;
    document.getElementById('endTurnBtn').disabled = !isMyTurn;

    const board = document.getElementById('board');
    board.innerHTML = "";
    Object.entries(state.territories).forEach(([name, data]) => {
        const card = document.createElement('div');
        card.className = "card";
        card.style.background = data.owner === myId ? "#27ae60" : "#c0392b";
        card.innerHTML = `${name}<br>🪖 ${data.troops}`;
        board.appendChild(card);
    });
}

function endTurn() {
    socket.emit('endTurn', { room: currentRoom });
}

function updateTroopCount() {
    document.getElementById('troops-count').innerText = totalTroops;
}
</script>
</body>
</html>
